
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Raíces Médicas — Próximamente</title>

  <meta name="description" content="Raíces Médicas: educación médica, salud renal e innovación en salud digital. Sitio en construcción." />
  <meta name="robots" content="index, follow" />

  <meta property="og:title" content="Raíces Médicas — Próximamente" />
  <meta property="og:description" content="Estamos construyendo una plataforma de educación médica, salud renal e innovación en salud digital." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://raicesmedicas.health/" />

  <style>
    :root{
      --bg:#0b1220;
      --text:#eaf0ff;
      --muted:#b9c4dd;
      --accent:#19c37d;
      --border:rgba(255,255,255,.10);
      --card:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh;
      display:grid; place-items:center;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(25,195,125,.18), transparent 60%),
        radial-gradient(900px 700px at 80% 90%, rgba(59,130,246,.18), transparent 55%),
        var(--bg);
      color:var(--text);
      padding:24px;
    }
    .card{
      width:min(860px, 100%);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:34px 28px;
      box-shadow:0 16px 60px rgba(0,0,0,.45);
      text-align:center;
      backdrop-filter: blur(10px);
    }
    .badge{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(25,195,125,.14);
      border:1px solid rgba(25,195,125,.35);
      font-size:13px;
      letter-spacing:.2px;
      margin-bottom:14px;
    }
    .logo{
      width:140px; height:140px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--border);
      display:grid; place-items:center;
      margin: 10px auto 18px;
      overflow:hidden;
    }
    .logo img{width:100%; height:100%; object-fit:contain; background:white}
    h1{margin:0 0 10px; font-size: clamp(30px, 4vw, 46px);}
    p{margin:0 auto 18px; color:var(--muted); line-height:1.6; max-width:62ch;}
    .line{height:1px; background:var(--border); margin:22px 0;}
    .contact{color:var(--muted); font-size:14px;}
    .contact a{color:var(--accent); text-decoration:none}
    .actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:14px;}
    .btn{
      display:inline-flex; align-items:center; gap:10px;
      padding:12px 16px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      color:var(--text);
      text-decoration:none;
      font-weight:600;
      transition:.15s transform ease, .15s background ease;
    }
    .btn:hover{transform:translateY(-1px); background:rgba(255,255,255,.09)}
    footer{margin-top:18px; font-size:12px; color:rgba(233,240,255,.70)}
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">🛠️ Sitio en construcción</div>

    <!-- Si tienes el logo en un archivo: assets/logo.svg -->
    <div class="logo">

      <img src="logo.svg" alt="Raíces Médicas Logo" onerror="this.style.display='none'; this.parentElement.textContent='RM'; this.parentElement.style.fontWeight='800'; this.parentElement.style.fontSize='32px';" />
</div>
    <h1>Raíces Médicas</h1>
    <p>Estamos construyendo una plataforma de educación médica, salud renal e innovación en salud digital.</p>

    <div class="line"></div>

    <div class="contact">
      Contacto: <a href="mailto:raicesmedicas@raicesmedicas.health">raicesmedicas@raicesmedicas.health</a>
    </div>

    <div class="actions">
      <a class="btn" href="mailto:raicesmedicas@raicesmedicas.health">📩 Enviar correo</a>
      <a class="btn" href="https://raicesmedicas.health">🌐 Visitar dominio</a>
    </div>

    <footer>© 2026 Raíces Médicas.</footer>
  </main>
</body>
</html>
